<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publisher - Select Sources | Vindral Examples</title>
    <!-- CSS Reset -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css"
    />
    <!-- Milligram CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.css"
    />
    <!-- Example CSS -->
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main class="wrapper">
      <nav class="navigation">
        <section class="container">
          <a class="button" href="../">Back to examples</a>
        </section>
      </nav>
      <section class="container">
        <h1>Publisher Select Sources Example</h1>
        <p>Publish live audio and video using the <code>@vindral/publisher</code> SDK with camera and microphone selection.</p>

        <div id="publisher-state">disconnected</div>

        <form id="publish-form" action="">
          <div class="form-section">
            <div class="input-row">
              <div class="input-group">
                <label for="channel-input">Channel ID</label>
                <input id="channel-input" type="text" placeholder="channel id" required />
              </div>
              <div class="input-group">
                <label for="auth-input">Auth Token</label>
                <input id="auth-input" type="text" placeholder="auth token" required />
              </div>
            </div>

            <div class="input-row">
              <div class="select-container">
                <label for="audioSource">Audio input source</label>
                <select id="audioSource"></select>
              </div>
              <div class="select-container">
                <label for="videoSource">Video input source</label>
                <select id="videoSource"></select>
              </div>
            </div>
          </div>

          <div id="preview-area">
            <video id="local-video" autoplay muted playsinline></video>
          </div>

          <input id="submit-button" type="submit" value="Publish" />
          <button id="stop-button" class="hidden" type="button">Stop</button>
        </form>
      </section>

      <section class="container" style="margin-top: 50px;">
        <ul>
          <li><a target="_blank" href="https://github.com/RealSprint/vindral-examples/tree/main/publisher-sources">Example source code</a></li>
          <li><a target="_blank" href="https://docs.vindral.com/">Vindral Documentation</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
